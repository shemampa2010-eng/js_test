<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="number" id="Celcius" placeholder="Celcius">
    <input type="number" id="fahrenheit" placeholder="fahrenheit">
    <br><br>
    <p id="resultat"></p>
    <button onclick="convertisseur()">Celcius vers Fahrenheit</button>
    <button onclick="FahrenheitVerscelsius()">Fahrenheit vers Celcius</button>

    <script>
        function convertisseur(){

            let celsius = document.getElementById("Celcius").value;

            let fahrenheit = (celsius * 9/5)+32;

            document.getElementById("resultat").innerHTML =
            celsius + " °C = " + fahrenheit + " °F";

        }
        function FahrenheitVerscelsius(){

            let fahrenheit = document.getElementById("fahrenheit").value;

            let celsius = (fahrenheit - 32) * 5/9;

            document.getElementById("resultat").innerHTML= 
            fahrenheit + " °F = "+ celsius + " °C" 
        }
    </script>
</body>
</html>
