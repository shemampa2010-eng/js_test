<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .thumb {
            width: 200px;
            cursor: pointer;
            opacity: 0.4;
        }
        .active {
            opacity: 1;
        }
    </style>
</head>
<body>

    <img src="SWAG.png" width="380" id="image">
    <br><br>

    <img src="skz x mahagrid 8 ball icon.jpeg" width="200" class="thumb" onclick="changer(this)">
    <img src="Start.png" width="200" class="thumb" onclick="changer(this)">
    <img src="SWAG.png" width="200" class="thumb" onclick="changer(this)">

    <script>
        function changer(img) {

            document.getElementById("image").src = img.src;

            let thumbs = document.querySelectorAll(".thumb");
            thumbs.forEach(t => t.classList.remove("active"));

            img.classList.add("active");
        }
    </script>

</body>
</html>
