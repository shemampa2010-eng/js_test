<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button type="button" onclick="addf()">Try it</button>
    <p id="p1"></p>
    <script>
        const fruits = ["Banane","Pomme","Anana","Fraise"]
        document.getElementById("p1").innerHTML=fruits
        function addf(){
            fruits.push("Lemon");
            document.getElementById('p1').innerHTML=fruits
        }
    </script>
</body>
</html>
