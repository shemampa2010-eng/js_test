<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>TEST JS</h1>
    <p id="p1"></p>
    <script>
        let cars = ["toyota","Benz","Hyundai"];
        let clen = cars.length;
        let text = "<ul>";
        for (let i = 0; i<clen; i++){
            text += "<li>" + cars[i] + "</li>"
        }
        text += "</ul>"
        document.getElementById("p1").innerHTML=text;
    </script>
</body>
</html>
