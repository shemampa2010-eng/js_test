<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="h1"></h1>
    <h2 id="h2"></h2>
    <script>
        const products = [
            {name: "Laptop", price: 1000},
            {name: "Phone", price: 500},
            {name: "Mouse", price: 50},
            {name: "Keyboard", price: 80}
        ];

        const expensiveProduct = products.find(product => product.price > 600);

        const cheapProducts = products.filter(product => product.price < 100);

        const phoneIndex = products.findIndex(product => product.name === "Phone");

        const lastCheapProduct = products.findLast(product => product.price < 1000);


        console.log("Premier produit cher :", expensiveProduct);
        console.log("Produits moins chers :", cheapProducts);
        console.log("Index du téléphone :", phoneIndex);
        console.log("Dernier produit < 1000 :", lastCheapProduct);
    </script>
</body>
</html>
