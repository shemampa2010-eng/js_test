<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="h1"></h1>
    <script>
        const students = [
            {name: "Paul", grade: 14},
            {name: "Emma", grade: 18},
            {name: "Lucas", grade: 9},
            {name: "Sarah", grade: 20}
        ];
        document.getElementById("h1").innerHTML = students.find(student => student.grade > 15)
    </script>
</body>
</html>
