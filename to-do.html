<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To Do List</title>
</head>

<body>

    <h2>Ma To-Do List</h2>
    <input id="taskInput" type="text" placeholder="Ajoute une tache">
    <button onclick="addTask()">Ajouter</button>
    <ul id="list">
        <li>
            <input type="checkbox"> Apprendre JavaScript
        </li>

        <li>
            <input type="checkbox"> Faire mes devoirs
        </li>

        <li>
            <input type="checkbox"> Sport
        </li>
    </ul>
    <script>
       
        function addTask() {

            let input = document.getElementById("taskInput");
            let text = input.value;

            let li = document.createElement("li");

            li.innerText = text;

            document.getElementById("list").appendChild(li);

            input.value = "";
        }

    </script>

</body>
</html>
