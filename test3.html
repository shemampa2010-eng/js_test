<!DOCTYPE html>
<html>
<body>

<p id="p1"></p>

<script>

const fruits = ["Banana", "Orange", "Apple", "Mango"];

const existe = fruits.includes("Apple");
const position = fruits.indexOf("Apple");

document.getElementById("p1").innerHTML =
"Le tableau contient Apple : " + existe + "<br>" +
"Apple est a l'indice : " + position;

</script>

</body>
</html>
