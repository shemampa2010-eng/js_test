<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>compteur</title>
</head>
<body>
    <h1 id="compteur">0</h1>
    <p id="p"></p>
     <button type="button" onclick="augmenter()">augmenter</button>
     <button type="button" onclick="diminuer()">diminuer</button>
     <button type="button" onclick="reset()">reset</button>
    <script>    
        let nombre = 0
        function augmenter(){
            nombre = nombre + 1;
            document.getElementById("compteur").innerHTML = nombre;
        }
        function diminuer(){
            if (nombre > 0){
                nombre = nombre - 1;
                document.getElementById("compteur").innerHTML = nombre;
            } else{
                document.getElementById("p").innerHTML="can not do this operation"
            }
        }
        function reset(){
            nombre = 0
            document.getElementById("compteur").innerHTML = nombre;
            document.getElementById("p").innerHTML=""
        }
    </script>
</body>
</html>
