<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .container {
            text-align: center;
        }

        .clock {
            font-size: 40px;
            background: #1e293b;
            padding: 20px 30px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h2>Time</h2>
    <br><br>
    <div class="container">
        <div class="clock">
            <span id="h">00</span>
            <span>:</span>
            <span id="min">00</span>
            <span>:</span>
            <span id="sec">00</span>
        </div>
    </div>
    <script>
        let hrs = document.getElementById("h")
        let min = document.getElementById("min")
        let sec = document.getElementById("sec")
        setInterval(()=>{
            let currentTime = new Date();
            hrs.innerHTML = currentTime.getHours();
            min.innerHTML = currentTime.getMinutes();
            sec.innerHTML = currentTime.getSeconds();

        },1000)
    </script>
</body>
</html>
