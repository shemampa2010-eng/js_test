<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="h1"></h1>
    <script>
        const numbers = [45, 70, 99, 100, 120];
        document.getElementById("h1").innerHTML = "The index of the first number equal of over 100 is: " + (numbers.findIndex(x => x >= 100) + 1)
    </script>
</body>
</html>
